<div
  class="w-full h-full bg-white shadow-2xl border border-gray-200 overflow-hidden flex flex-col"
>
  <div
    class="flex items-center justify-between px-6 py-5 border-b border-gray-100"
  >
    <h2 class="text-lg font-bold text-gray-900 m-0 leading-none">
      {{ labelModal() }}
    </h2>
    <button
      (click)="close()"
      class="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-all"
    >
      <ion-icon name="close-outline" class="text-xl"></ion-icon>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto">
    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="px-6 py-6 space-y-6"
    >
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">
          Nombre <span class="text-red-400">*</span>
        </label>
        <input
          formControlName="name"
          type="text"
          placeholder="p. ej., Trabajo, Personal"
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all shadow-inner"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2.5"
          >Color</label
        >
        <div class="flex flex-wrap gap-3">
          @for (color of colorOptions; track color.id) {
            <button
              type="button"
              (click)="selectedColor.set(color)"
              [class]="color.bg"
              class="w-10 h-10 rounded-full flex items-center justify-center transition-all active:scale-90 relative shadow-sm"
              [class.ring-2]="selectedColor().id === color.id"
              [class.ring-offset-2]="selectedColor().id === color.id"
              [class.ring-gray-800]="selectedColor().id === color.id"
            >
              @if (selectedColor().id === color.id) {
                <ion-icon
                  name="checkmark-outline"
                  class="text-white font-bold text-lg"
                ></ion-icon>
              }
            </button>
          }
        </div>
      </div>

      @if (form.get("name")?.value) {
        <div
          class="p-4 bg-gray-50/50 rounded-2xl border border-gray-100 animate-in fade-in zoom-in-95"
        >
          <p
            class="text-[10px] uppercase tracking-[0.1em] font-bold text-gray-400 mb-2 ml-1"
          >
            Vista previa
          </p>
          <span
            [class]="selectedColor().class"
            class="inline-flex items-center gap-2 text-sm font-semibold px-4 py-2 rounded-full shadow-sm"
          >
            <ion-icon name="pricetag-outline" class="text-xs"></ion-icon>
            {{ form.get("name")?.value }}
          </span>
        </div>
      }

      <div class="flex items-center gap-3 pt-2">
        <button
          type="button"
          (click)="close()"
          class="flex-1 py-3.5 text-gray-600 bg-gray-100 rounded-xl font-semibold hover:bg-gray-200 transition-all active:scale-95"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="form.invalid"
          class="flex-1 py-3.5 bg-emerald-600 text-white rounded-xl font-semibold hover:bg-emerald-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all active:scale-[0.98] shadow-lg shadow-emerald-100"
        >
          Guardar
        </button>
      </div>
    </form>
  </div>
</div>
