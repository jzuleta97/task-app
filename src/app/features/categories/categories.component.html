<div class="page-container">
  <div class="card-container">
    <div
      class="px-6 py-6 border-b border-gray-100 bg-white relative z-10 shadow-sm"
    >
      <div class="flex items-center justify-between mb-6">
        <button
          (click)="goBack()"
          class="flex items-center gap-2 text-gray-500 hover:text-gray-900 transition-colors font-medium"
        >
          <ion-icon name="arrow-back-outline"></ion-icon>
          Volver
        </button>
        <h1 class="text-xl font-bold text-gray-900 tracking-tight">
          Categorías
        </h1>
        <div class="w-16"></div>
      </div>

      <button
        (click)="openAddModal()"
        [disabled]="!canCreate()"
        class="btn-primary-emerald"
      >
        @if (canCreate()) {
          <ion-icon name="add-outline" class="stroke-[2.5]"></ion-icon>
          <span>Añadir nueva categoría</span>
        } @else {
          <ion-icon name="lock-closed-outline"></ion-icon>
          <span>Creación deshabilitada</span>
        }
      </button>
    </div>

    <div
      class="px-6 py-6 bg-gray-50/50 min-h-[350px] max-h-[60vh] overflow-y-auto custom-scroll"
    >
      <ul class="space-y-3 p-0 m-0 list-none">
        @for (category of categories(); track category.id) {
          <li class="list-item-category">
            <span
              [class]="category.color"
              class="inline-flex items-center gap-1.5 text-sm font-medium px-3 py-1.5 rounded-full"
            >
              <ion-icon name="pricetag-outline" class="text-xs"></ion-icon>
              {{ category.name }}
            </span>

            <div class="flex flex-row gap-2">
              <button
                (click)="openCategoryModal(category)"
                class="icon-btn edit"
              >
                <ion-icon name="create-outline"></ion-icon>
              </button>
              <button
                (click)="deleteCategory(category.id)"
                class="icon-btn delete"
              >
                <ion-icon name="trash-outline" class="text-lg"></ion-icon>
              </button>
            </div>
          </li>
        } @empty {
          <div
            class="flex flex-col items-center justify-center py-12 text-gray-400"
          ></div>
        }
      </ul>
    </div>
  </div>
</div>
