<div
  class="min-h-screen bg-gray-100 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans selection:bg-indigo-100 selection:text-indigo-900"
>
  <div class="w-full max-w-md mx-auto">
    <header class="text-center mb-10">
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">
        App de Tareas
      </h1>
      <p class="text-gray-500 mt-2">Gestiona tus tareas y categorías</p>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <button
        (click)="onCardClick('tasks')"
        class="group relative flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-sm border border-gray-200 hover:border-indigo-300 hover:shadow-md transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 active:scale-95"
      >
        <div
          class="w-16 h-16 mb-4 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center group-hover:scale-110 group-hover:bg-indigo-100 transition-all duration-300"
        >
          <ion-icon name="checkbox-outline" class="text-3xl"></ion-icon>
        </div>
        <h2 class="text-xl font-bold text-gray-900 mb-1">Tareas</h2>
        <p class="text-sm text-gray-500 font-medium">
          {{ totalCount() }} en total • {{ completedCount() }} listas
        </p>
      </button>

      <button
        (click)="onCardClick('categories')"
        class="group relative flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-sm border border-gray-200 hover:border-emerald-300 hover:shadow-md transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 active:scale-95"
      >
        <div
          class="w-16 h-16 mb-4 rounded-2xl bg-emerald-50 text-emerald-600 flex items-center justify-center group-hover:scale-110 group-hover:bg-emerald-100 transition-all duration-300"
        >
          <ion-icon name="pricetag-outline" class="text-3xl"></ion-icon>
        </div>
        <h2 class="text-xl font-bold text-gray-900 mb-1">Categorías</h2>
        <p class="text-sm text-gray-500 font-medium">
          {{ categories().length }} categorías
        </p>
      </button>
    </div>
  </div>
</div>
